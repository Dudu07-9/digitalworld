<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO DUDU | CYBERSPACE MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root {
            --bg-body: #000;
            --bg-card: rgba(10, 10, 10, 0.98);
            --text-main: #fff;
            --neon: #0ff;
            --neon-pink: #f0f;
            --border: rgba(0, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* --- EFEITO SCANNER GERAL --- */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px var(--neon);
            z-index: 9999;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .font-titan { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: -0.05em; }

        /* --- PRELOADER MATRIX --- */
        #preloader { 
            position: fixed; inset: 0; background: #000; z-index: 10000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        #preloader-canvas { position: absolute; inset: 0; opacity: 0.2; pointer-events: none; }

        .cyber-loader {
            width: 140px; height: 140px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            z-index: 10;
        }
        .loader-ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: var(--neon);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loader-logs {
            margin-top: 30px; font-family: 'monospace'; font-size: 10px;
            color: var(--neon); text-transform: uppercase; letter-spacing: 2px;
            text-align: center; height: 20px; z-index: 10;
        }

        /* =========================================
           --- NOVO EFEITO "CYBER SCAN" EM DIGITAL WORLD ---
           ========================================= */
        .glitch-wrapper { 
            position: relative; 
            padding-left: 20px;
            border-left: 4px solid var(--neon);
        }

        .cyber-scan-title {
            position: relative;
            color: #fff;
            text-transform: uppercase;
            display: block;
            /* Brilho de fundo */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* Camadas de Glitch */
        .cyber-scan-title::before,
        .cyber-scan-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; /* Cobre o texto original para o efeito de corte */
        }

        /* Camada Rosa - Corte Superior */
        .cyber-scan-title::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip-path: inset(10% 0 70% 0);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        /* Camada Ciano - Corte Inferior */
        .cyber-scan-title::after {
            left: -2px;
            text-shadow: 2px 0 var(--neon);
            clip-path: inset(70% 0 10% 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        /* Linha de Varredura (Scanner) que passa pelo texto */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--neon);
            left: 0;
            z-index: 10;
            box-shadow: 0 0 15px var(--neon);
            opacity: 0.7;
            pointer-events: none;
            animation: scan-move 2.5s infinite linear;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 50% 0); transform: translate(-5px); }
            20% { clip-path: inset(80% 0 1% 0); transform: translate(5px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-2px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translate(2px); }
            80% { clip-path: inset(50% 0 20% 0); transform: translate(-5px); }
            100% { clip-path: inset(20% 0 50% 0); transform: translate(0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(5px); }
            25% { clip-path: inset(50% 0 20% 0); transform: translate(-5px); }
            50% { clip-path: inset(20% 0 50% 0); transform: translate(2px); }
            75% { clip-path: inset(80% 0 5% 0); transform: translate(-2px); }
            100% { clip-path: inset(10% 0 80% 0); transform: translate(0); }
        }

        @keyframes scan-move {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* --- CARDS E BOTÕES --- */
        .cyber-card { 
            background: rgba(10, 10, 10, 0.98); 
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%); 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; border: 1px solid var(--border);
        }
        .cyber-card:hover { border-color: var(--neon); box-shadow: 0 0 40px rgba(0, 255, 255, 0.2); transform: translateY(-10px); }

        .btn-cyber { 
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); 
            background: var(--neon); color: #000; font-weight: 900; 
            transition: all 0.3s; font-family: 'Orbitron';
        }
        .btn-cyber:hover { background: #fff; box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }
    </style>
</head>
<body class="loading overflow-hidden">

    <div id="preloader">
        <canvas id="preloader-canvas"></canvas>
        <div class="flex flex-col items-center">
            <div class="cyber-loader">
                <div class="loader-ring"></div>
                <span class="font-titan text-neon text-4xl animate-pulse">ID</span>
            </div>
            <div id="loader-status" class="loader-logs">Decriptando Dados...</div>
            <div class="w-48 h-[2px] bg-zinc-900 mt-4 relative overflow-hidden">
                <div id="progress-bar" class="absolute inset-0 bg-neon w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto relative z-50">
        <div class="flex items-center gap-4 cursor-pointer">
            <div class="w-12 h-12 border-2 border-neon flex items-center justify-center font-black text-neon shadow-[0_0_15px_#0ff]">D</div>
            <h1 class="text-2xl font-titan uppercase tracking-tighter">INFO<span class="text-neon">DUDU</span></h1>
        </div>
        <button id="open-cart-btn" class="relative p-4 border border-neon/30 bg-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0ff" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-badge" class="absolute -top-2 -right-2 bg-[#f0f] text-white text-[10px] w-6 h-6 flex items-center justify-center rounded-full font-bold">0</span>
        </button>
    </nav>

    <header class="py-20 px-6 max-w-7xl mx-auto relative">
        <div class="glitch-wrapper" data-aos="fade-right">
            <div class="scan-line"></div>
            
            <h2 class="text-7xl md:text-9xl font-black cyber-scan-title" data-text="DIGITAL">
                DIGITAL
            </h2>
            <h2 class="text-6xl md:text-8xl font-black cyber-scan-title" data-text="WORLD" style="opacity: 0.8;">
                WORLD
            </h2>
        </div>
    </header>

    <section class="p-8 max-w-7xl mx-auto mb-32">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </section>

    <div id="product-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 invisible opacity-0 transition-all duration-300">
        <div id="modal-overlay" class="absolute inset-0 bg-black/95 backdrop-blur-sm"></div>
        <div id="modal-content" class="relative bg-zinc-950 w-full max-w-lg border border-neon p-10 flex flex-col items-center">
            <button id="close-modal-btn" class="absolute top-4 right-4 text-neon font-titan">X</button>
            <div id="modal-icon" class="text-neon mb-6 opacity-30"></div>
            <h2 id="modal-title" class="text-4xl font-titan uppercase mb-2 text-center">---</h2>
            <p id="modal-desc" class="text-zinc-500 text-sm text-center mb-8">---</p>
            <div class="flex items-center justify-between w-full">
                <span id="modal-price" class="text-3xl font-titan text-white">R$ 0</span>
                <button id="add-btn-modal" class="btn-cyber px-8 py-3 uppercase text-[10px]">Acquire</button>
            </div>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-black/80 z-[80] hidden backdrop-blur-md"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[380px] z-[90] bg-black border-l border-neon translate-x-full transition-transform duration-500 p-8 flex flex-col">
        <h2 class="text-2xl font-titan text-neon mb-10 italic uppercase tracking-widest">Storage_Data</h2>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="border-t border-neon/30 pt-8 mt-6">
            <div class="flex justify-between mb-6"><span class="text-zinc-500 text-xs uppercase font-mono">Total_Credits</span><span id="total-price" class="font-titan text-2xl text-neon">R$ 0,00</span></div>
            <button id="checkout-btn" class="w-full btn-cyber py-5 uppercase text-xs">Execute Order</button>
            <button id="close-cart-btn" class="w-full mt-4 text-center text-zinc-600 text-[10px] uppercase font-mono">[ Fechar Terminal ]</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        const meuNumero = "5599999999999"; 
        let cartItems = [];
        let total = 0;

        const produtosLocais = [
            { id: 1, nome: "REDMI NOTE 13", preco: 1450.00, categoria: "Mobile Pro", tipo: "smartphone", descricao: "Protocolo de comunicação avançado." },
            { id: 2, nome: "Fone TWS Cyber", preco: 89.90, categoria: "Audio Link", tipo: "headset", descricao: "Sincronização neural estável." },
            { id: 3, nome: "Tablet Ultra 10", preco: 980.00, categoria: "Display Unit", tipo: "monitor", descricao: "Visualização de dados de alta densidade." },
            { id: 4, nome: "Inova Audio X", preco: 49.90, categoria: "Acoustic Unit", tipo: "headset", descricao: "Isolamento acústico ativo." },
            { id: 5, nome: "Cabo Turbo 120W", preco: 45.00, categoria: "Energy Supply", tipo: "cpu", descricao: "Transferência de energia ultra-rápida." },
            { id: 6, nome: "Mouse Cyber-G", preco: 120.00, categoria: "Input Unit", tipo: "cpu", descricao: "Rastreamento tátil de alta precisão." }
        ];

        // --- LÓGICA DO SITE ---
        const salvarCarrinho = () => localStorage.setItem('infodudu_cart', JSON.stringify(cartItems));
        const recuperarCarrinho = () => {
            const salvo = localStorage.getItem('infodudu_cart');
            if (salvo) {
                cartItems = JSON.parse(salvo);
                total = cartItems.reduce((acc, item) => acc + item.price, 0);
                updateCartUI();
            }
        };

        function getIcon(type) {
            const size = 120, stroke = 1;
            const icons = {
                monitor: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${stroke}"><rect x="2" y="3" width="20" height="14" rx="1"></rect><path d="M8 21h8M12 17v4"></path></svg>`,
                smartphone: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${stroke}"><rect x="5" y="2" width="14" height="20" rx="2"></rect><circle cx="12" cy="18" r="1"></circle></svg>`,
                headset: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${stroke}"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>`,
                cpu: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${stroke}"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M9 2v2M20 9h2M20 15h2M2 9h2M2 15h2M9 20v2M15 20v2"/></svg>`
            };
            return icons[type] || ``;
        }

        async function carregarProdutos() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ''; 
            produtosLocais.forEach((p) => {
                grid.innerHTML += `
                    <div onclick="window.openProduct('${p.nome}', ${p.preco}, '${p.descricao}', '${p.tipo}')" data-aos="zoom-in-up" class="cyber-card p-10 min-h-[350px] flex flex-col justify-between group cursor-pointer">
                        <div class="absolute top-4 right-4 text-[10px] text-neon/30 font-mono">#000${p.id}</div>
                        <div class="flex justify-center items-center h-28 text-neon opacity-30 group-hover:opacity-100 transition duration-700">${getIcon(p.tipo)}</div>
                        <div>
                            <span class="text-[10px] text-neon uppercase tracking-widest font-bold font-mono">Protocol_Sync</span>
                            <h2 class="text-3xl font-titan uppercase text-white leading-tight mt-1 group-hover:text-neon transition">${p.nome}</h2>
                            <div class="flex justify-between items-end mt-6 pt-4 border-t border-neon/10">
                                <p class="text-zinc-500 text-[10px] uppercase font-mono">${p.categoria}</p>
                                <p class="font-titan text-xl text-white">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            if(window.AOS) AOS.refresh();
        }

        window.openProduct = (name, price, desc, type) => {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = `R$ ${price.toFixed(2).replace('.', ',')}`;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-icon').innerHTML = getIcon(type).replace('size = 120', 'size = 180');
            document.getElementById('add-btn-modal').onclick = () => addToCart(name, price);
            const m = document.getElementById('product-modal');
            m.classList.remove('invisible'); m.classList.add('opacity-100');
        };

        const closeModal = () => {
            document.getElementById('product-modal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('product-modal').classList.add('invisible'), 300);
        };

        const addToCart = (name, price) => {
            cartItems.push({name, price}); total += price;
            salvarCarrinho(); updateCartUI(); closeModal();
            document.getElementById('cart-sidebar').style.transform = 'translateX(0)';
            document.getElementById('cart-overlay').classList.remove('hidden');
        };

        const updateCartUI = () => {
            const list = document.getElementById('cart-items');
            list.innerHTML = cartItems.length === 0 ? '<p class="text-center text-zinc-700 uppercase text-[10px] mt-20 font-mono">[ Sem Dados ]</p>' : 
                cartItems.map(item => `<div class="flex justify-between p-4 border border-neon/10 bg-white/5 animate-pulse"><span class="font-titan text-[10px] uppercase">${item.name}</span><span class="text-neon text-[10px]">R$ ${item.price.toFixed(2)}</span></div>`).join('');
            document.getElementById('cart-badge').innerText = cartItems.length;
            document.getElementById('total-price').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
        };

        document.getElementById('close-modal-btn').onclick = closeModal;
        document.getElementById('open-cart-btn').onclick = () => { document.getElementById('cart-sidebar').style.transform = 'translateX(0)'; document.getElementById('cart-overlay').classList.remove('hidden'); };
        document.getElementById('close-cart-btn').onclick = () => { document.getElementById('cart-sidebar').style.transform = 'translateX(100%)'; document.getElementById('cart-overlay').classList.add('hidden'); };
        
        document.getElementById('checkout-btn').onclick = () => {
            if(!cartItems.length) return;
            const text = encodeURIComponent(`⚡ *PEDIDO INFO DUDU*\n\n${cartItems.map(i => `> ${i.name}`).join('\n')}\n\n*TOTAL:* R$ ${total.toFixed(2)}`);
            window.open(`https://wa.me/${meuNumero}?text=${text}`);
        };

        // --- PRELOADER MATRIX ---
        window.onload = () => {
            carregarProdutos();
            recuperarCarrinho();

            const canvas = document.getElementById('preloader-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = "0101010101ABCDEF";
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function drawMatrix() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0ff";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            const matrixInterval = setInterval(drawMatrix, 50);

            const logs = ["Decriptando Kernel...", "Injetando Scripts...", "Sincronizando Firebase...", "Buscando Produtos...", "Acesso Concedido!"];
            let logIndex = 0;
            const statusEl = document.getElementById('loader-status');
            const progressEl = document.getElementById('progress-bar');

            const logTimer = setInterval(() => {
                if (logIndex < logs.length) {
                    statusEl.innerText = logs[logIndex];
                    progressEl.style.width = ((logIndex + 1) / logs.length * 100) + "%";
                    logIndex++;
                }
            }, 500);

            setTimeout(() => {
                clearInterval(matrixInterval);
                clearInterval(logTimer);
                const preloader = document.getElementById('preloader');
                preloader.style.transition = "all 0.8s cubic-bezier(0.9, 0, 0.1, 1)";
                preloader.style.opacity = "0";
                preloader.style.transform = "translateY(-100%)";
                
                setTimeout(() => {
                    preloader.style.display = "none";
                    document.body.classList.remove('overflow-hidden');
                    AOS.init({ duration: 1000, once: true });
                }, 800);
            }, 3000);
        };
    </script>
</body>
</html>
